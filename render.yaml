services:
  - type: web
    name: castnet-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_PATH
        value: /tmp/pylon.db
      - key: EXCEL_OUTPUT_DIR
        value: /tmp/exports/
      - key: CORS_ORIGINS
        value: https://turje.github.io
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CSE_ID
        sync: false
