<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CastNet</title>
    <meta name="description" content="CastNet — AI-powered multi-agent job hunting platform. 7 agents automate your entire job search.">
    <meta property="og:title" content="CastNet">
    <meta property="og:description" content="7 AI agents automate your entire job search pipeline">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://turje.github.io/JobHuntingAgents/">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource-variable/inter@5/index.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1/dist/fonts/geist-sans/style.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1/dist/fonts/geist-mono/style.min.css">
    <style>
        :root {
            --bg: #09090b;
            --surface: #111113;
            --surface-hover: #18181b;
            --surface-raised: #27272a;
            --border: rgba(255,255,255,0.06);
            --border-light: rgba(255,255,255,0.1);
            --text: #fafafa;
            --text-muted: #a1a1aa;
            --text-dim: #52525b;
            --accent: #3b82f6;
            --accent-glow: rgba(59,130,246,0.15);
            --green: #22c55e;
            --green-glow: rgba(34,197,94,0.12);
            --red: #ef4444;
            --red-glow: rgba(239,68,68,0.12);
            --radius: 10px;
            --radius-sm: 6px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Geist Sans', 'Inter Variable', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        body::before {
            content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            background-repeat: repeat; background-size: 256px 256px;
        }
        button { cursor: pointer; font-family: inherit; }
        input { font-family: inherit; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ---- HEADER ---- */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--border);
        }
        .header-left { display: flex; align-items: center; }
        .logo {
            font-family: 'Geist Sans', sans-serif;
            font-size: 1.15rem; font-weight: 600; color: var(--text); text-decoration: none;
        }
        .logo:hover { text-decoration: none; opacity: 0.8; }
        .header-nav { display: flex; align-items: center; gap: 20px; }
        .nav-link { font-size: 0.82rem; color: var(--text-muted); text-decoration: none; font-weight: 500; transition: color 0.15s; }
        .nav-link:hover, .nav-link.active { color: var(--text); text-decoration: none; }
        .nav-icon { display: flex; align-items: center; }

        /* ---- SEARCH ---- */
        .search-wrap {
            padding: 28px 24px 24px;
            border-bottom: 1px solid var(--border);
        }
        .search-inner {
            max-width: 720px; margin: 0 auto;
        }
        .search-label {
            font-size: 0.85rem; color: var(--text-muted); margin-bottom: 10px;
            text-align: center;
        }
        .mode-toggle {
            display: flex; gap: 0; margin-bottom: 12px;
            background: var(--surface); border-radius: var(--radius-sm);
            border: 1px solid var(--border); overflow: hidden; width: fit-content;
        }
        .mode-pill {
            padding: 6px 20px; font-size: 0.78rem; font-weight: 600;
            background: transparent; border: none; color: var(--text-dim);
            cursor: pointer; transition: all 0.15s;
        }
        .mode-pill.active { background: var(--accent); color: #fff; }
        .search-box {
            display: flex; gap: 0;
            background: var(--surface); border: 2px solid transparent;
            border-radius: var(--radius); overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }
        .search-box input {
            flex: 1; background: transparent; border: none; color: var(--text);
            padding: 0 20px; font-size: 1rem; outline: none;
            height: 48px; box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
        }
        .search-box input::placeholder { color: var(--text-dim); }
        .search-box button {
            background: var(--accent);
            color: #fff; border: none; padding: 0 28px;
            font-weight: 700; font-size: 0.95rem; white-space: nowrap;
            height: 48px; transition: opacity 0.15s;
        }
        .search-box button:hover { opacity: 0.9; }
        .search-box button:disabled { opacity: 0.3; cursor: not-allowed; }

        /* ---- LAYOUT ---- */
        .main { display: flex; height: calc(100vh - 140px); }

        /* ---- SIDEBAR ---- */
        .sidebar {
            width: 270px; min-width: 270px; border-right: 1px solid var(--border);
            overflow-y: auto; background: var(--surface);
        }
        .sidebar-header {
            padding: 12px 16px; font-size: 0.72rem; font-weight: 700;
            color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px;
            border-bottom: 1px solid var(--border);
        }
        .session-item {
            padding: 10px 16px; border-bottom: 1px solid var(--border);
            cursor: pointer; font-size: 0.82rem; transition: background 0.15s;
        }
        .session-item:hover { background: var(--surface-hover); }
        .session-item.active { background: var(--bg); border-left: 2px solid var(--accent); }
        .session-query { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
        .session-meta { font-family: 'Geist Mono', monospace; font-size: 0.68rem; color: var(--text-dim); display: flex; justify-content: space-between; align-items: center; margin-top: 4px; gap: 4px; }
        .session-timer { color: var(--accent); font-weight: 600; font-variant-numeric: tabular-nums; }
        .session-del {
            opacity: 0; background: none; border: none; color: var(--red);
            font-size: 0.85rem; padding: 0 4px; cursor: pointer;
        }
        .session-item:hover .session-del { opacity: 0.7; }
        .session-del:hover { opacity: 1 !important; }
        .session-copy {
            opacity: 0; background: none; border: none; color: var(--text-muted);
            font-size: 0.75rem; padding: 0 4px; cursor: pointer; transition: opacity 0.15s;
        }
        .session-item:hover .session-copy { opacity: 0.7; }
        .session-copy:hover { opacity: 1 !important; color: var(--accent); }
        .session-copy.copied { color: var(--green); opacity: 1 !important; }
        .badge {
            font-family: 'Geist Mono', monospace; font-size: 0.65rem; padding: 2px 8px;
            border-radius: var(--radius-sm); font-weight: 600;
            background: var(--surface-raised); color: var(--text-muted);
        }
        .badge-running { background: var(--accent-glow); color: var(--accent); }
        .badge-completed { background: var(--green-glow); color: var(--green); }
        .badge-failed { background: var(--red-glow); color: var(--red); }

        /* ---- CONTENT ---- */
        .content { flex: 1; overflow-y: auto; padding: 24px; }

        /* ---- STEPPER ---- */
        .stepper {
            display: flex; align-items: center; gap: 0;
            padding: 14px 18px; background: var(--surface);
            border: 1px solid var(--border); border-radius: var(--radius);
            margin-bottom: 20px; overflow-x: auto;
        }
        .step-node { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 72px; }
        .step-circle {
            width: 32px; height: 32px; border-radius: 50%;
            border: 2px solid var(--border-light); display: flex;
            align-items: center; justify-content: center;
            font-size: 0.72rem; font-weight: 700; color: var(--text-dim);
            transition: all 0.3s;
        }
        .step-circle.active {
            border-color: var(--accent); color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
            animation: pulse 1.5s infinite;
        }
        .step-circle.done {
            border-color: var(--green); background: var(--green); color: #000;
            box-shadow: 0 0 8px var(--green-glow);
        }
        .step-label { font-size: 0.62rem; color: var(--text-dim); text-align: center; }
        .step-conn { flex: 1; height: 2px; background: var(--border-light); min-width: 10px; }
        .step-conn.done { background: var(--green); }
        @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(59,130,246,.4); } 50% { box-shadow: 0 0 0 6px rgba(59,130,246,0); } }

        /* ---- STATS BAR ---- */
        .stats-bar {
            display: flex; gap: 10px; flex-wrap: wrap;
            margin-bottom: 20px; align-items: center;
        }
        .stat {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 8px 14px;
            font-size: 0.82rem; display: flex; align-items: center; gap: 6px;
        }
        .stat-num { font-weight: 700; font-size: 1.1rem; color: var(--accent); }
        .stat-label { color: var(--text-muted); }
        .btn {
            padding: 7px 16px; border: none; border-radius: var(--radius-sm);
            font-size: 0.82rem; font-weight: 600; transition: all 0.15s;
        }
        .btn:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn-accent { background: var(--accent); color: #fff; }
        .btn-green { background: var(--green); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
        .btn-sm { padding: 5px 12px; font-size: 0.75rem; }

        /* ---- COMPANY CARD ---- */
        .company-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); margin-bottom: 16px;
            transition: border-color 0.2s;
        }
        .company-card:hover { border-color: var(--border-light); }
        .cc-header {
            padding: 18px 20px; display: flex; align-items: flex-start;
            justify-content: space-between; gap: 16px; cursor: pointer;
        }
        .cc-header:hover { background: var(--surface-hover); border-radius: var(--radius) var(--radius) 0 0; }
        .cc-name { font-size: 1.15rem; font-weight: 700; }
        .cc-meta { display: flex; gap: 6px; align-items: center; margin-top: 6px; flex-wrap: wrap; }
        .cc-tag {
            font-size: 0.68rem; padding: 3px 10px; border-radius: var(--radius-sm);
            font-weight: 600; background: var(--surface-raised); color: var(--text-muted);
        }
        .cc-tag-domain { background: var(--accent-glow); color: var(--accent); }
        .cc-tag-conf { background: var(--green-glow); color: var(--green); }
        .cc-tag-funding { background: var(--surface-raised); color: var(--text-muted); }
        .cc-tag-hq { background: var(--surface-raised); color: var(--text-muted); }
        .cc-tag-size { background: var(--surface-raised); color: var(--text-muted); }
        .cc-reason { color: var(--text-muted); font-size: 0.84rem; margin-top: 6px; line-height: 1.5; }
        .cc-links { display: flex; gap: 8px; margin-top: 8px; }
        .cc-link-btn {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 0.75rem; padding: 4px 12px; border-radius: var(--radius-sm);
            border: 1px solid var(--border); color: var(--accent);
            background: transparent; text-decoration: none; font-weight: 600;
            transition: all 0.15s;
        }
        .cc-link-btn:hover { background: var(--accent-glow); border-color: var(--accent); text-decoration: none; }
        .cc-link-btn.careers { color: var(--green); }
        .cc-link-btn.careers:hover { background: var(--green-glow); border-color: var(--green); }
        .cc-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
        .cc-expand { color: var(--text-dim); font-size: 1.3rem; padding: 4px; transition: transform 0.2s; user-select: none; }
        .cc-expand.open { transform: rotate(180deg); }

        /* ---- TABS ---- */
        .cc-tabs {
            display: flex; border-bottom: 1px solid var(--border);
            background: var(--surface); overflow-x: auto;
        }
        .cc-tab {
            padding: 10px 18px; font-size: 0.8rem; font-weight: 600;
            color: var(--text-dim); cursor: pointer; white-space: nowrap;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
        }
        .cc-tab:hover { color: var(--text-muted); background: var(--surface-hover); }
        .cc-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        .cc-tab-content { padding: 20px; }

        /* ---- Section shared ---- */
        .section-empty { color: var(--text-dim); font-size: 0.85rem; font-style: italic; padding: 12px 0; }

        /* Research grid */
        .research-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .rg-item { background: var(--bg); border-radius: var(--radius-sm); padding: 12px 14px; }
        .rg-label { font-size: 0.68rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; font-weight: 600; }
        .rg-value { font-size: 0.85rem; color: var(--text-muted); }
        .rg-list { list-style: none; padding: 0; }
        .rg-list li { font-size: 0.82rem; padding: 2px 0; color: var(--text-muted); }
        .rg-list li::before { content: ""; display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); margin-right: 8px; vertical-align: middle; }
        .rg-full { grid-column: 1 / -1; }

        /* Skills / Chips */
        .chips-row { display: flex; flex-wrap: wrap; gap: 6px; }
        .chip {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 4px 10px; font-size: 0.78rem;
            font-weight: 500;
        }
        .chip.learn { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
        .alignment-bar {
            height: 8px; border-radius: 4px; background: var(--bg);
            margin-top: 8px; overflow: hidden;
        }
        .alignment-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }

        /* Contact row */
        .contact-row {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 14px; background: var(--bg);
            border-radius: var(--radius-sm); margin-bottom: 8px;
        }
        .contact-avatar {
            width: 38px; height: 38px; border-radius: 50%;
            background: var(--surface-raised);
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; font-weight: 700; color: var(--text-muted);
            flex-shrink: 0;
        }
        .contact-info { flex: 1; min-width: 0; }
        .contact-name { font-weight: 600; font-size: 0.88rem; }
        .contact-title { color: var(--text-muted); font-size: 0.78rem; }
        .contact-links { display: flex; gap: 10px; font-size: 0.78rem; }

        /* Outreach */
        .outreach-card {
            background: var(--bg); border-radius: var(--radius-sm);
            padding: 14px; margin-bottom: 10px; border: 1px solid var(--border);
        }
        .outreach-subject { font-weight: 600; font-size: 0.88rem; margin-bottom: 4px; }
        .outreach-body {
            font-size: 0.82rem; color: var(--text-muted); white-space: pre-wrap;
            word-break: break-word; max-height: 160px; overflow-y: auto;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 10px; margin-top: 6px;
        }
        .outreach-actions { margin-top: 8px; display: flex; gap: 8px; }

        /* Tool Suggestion card */
        .tool-card {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 14px;
            margin-bottom: 10px; transition: border-color 0.15s;
        }
        .tool-card:hover { border-color: var(--accent); }
        .tool-card-name { font-weight: 700; font-size: 0.92rem; color: var(--accent); margin-bottom: 4px; }
        .tool-card-desc { font-size: 0.84rem; color: var(--text-muted); margin-bottom: 6px; line-height: 1.5; }
        .tool-card-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
        .tool-card-why {
            font-size: 0.78rem; color: var(--text-dim); margin-bottom: 4px;
            padding: 6px 10px; background: var(--surface); border-radius: var(--radius-sm);
            border-left: 3px solid var(--accent);
        }
        .tool-card-revenue {
            font-size: 0.72rem; padding: 3px 10px; border-radius: var(--radius-sm);
            background: var(--green-glow); color: var(--green);
            font-weight: 600;
        }

        /* Resume section */
        .resume-upload-area {
            display: flex; align-items: center; gap: 12px;
            padding: 14px; background: var(--bg);
            border: 2px dashed var(--border); border-radius: var(--radius);
            margin-bottom: 16px;
        }
        .resume-upload-area .filename { font-size: 0.85rem; color: var(--green); font-weight: 600; }
        .resume-upload-area .preview {
            font-size: 0.78rem; color: var(--text-dim); max-width: 400px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .resume-content { background: var(--bg); border-radius: var(--radius-sm); padding: 14px; border: 1px solid var(--border); }

        /* ---- EMPTY / TOAST ---- */
        .empty-state { text-align: center; padding: 100px 20px; color: var(--text-muted); }
        .empty-state h3 {
            font-size: 1.5rem; margin-bottom: 10px; font-weight: 700;
            color: var(--text);
        }
        .empty-state p { max-width: 500px; margin: 0 auto; }

        .toast-container { position: fixed; top: 14px; right: 14px; z-index: 1000; display: flex; flex-direction: column; gap: 6px; }
        .toast {
            padding: 10px 16px; border-radius: var(--radius-sm); font-size: 0.82rem;
            animation: slideIn 0.25s ease; max-width: 360px;
            backdrop-filter: blur(10px); font-weight: 500;
        }
        .toast.success { background: rgba(34,197,94,0.9); color: #000; }
        .toast.error { background: rgba(239,68,68,0.9); color: #fff; }
        .toast.info { background: rgba(59,130,246,0.9); color: #fff; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .header { padding: 8px 12px; }
            .research-grid { grid-template-columns: 1fr; }
            .search-wrap { padding: 16px 12px; }
            .content { padding: 16px 12px; }
            .main { height: auto; min-height: calc(100vh - 140px); }
            .stepper { padding: 10px 12px; }
            .step-node { min-width: 56px; }
            .step-label { font-size: 0.56rem; }
            .cc-header { padding: 14px 14px; flex-direction: column; gap: 10px; }
            .cc-right { flex-direction: row; align-items: center; }
            .cc-tab-content { padding: 14px; }
            .contact-row { flex-direction: column; align-items: flex-start; gap: 8px; }
            .stats-bar { gap: 6px; }
            .stat { padding: 6px 10px; font-size: 0.78rem; }
            .mode-toggle { width: 100%; }
            .mode-pill { flex: 1; text-align: center; }
        }
        @media (max-width: 480px) {
            .header-nav { gap: 12px; }
            .nav-link { font-size: 0.78rem; }
            .search-box input { font-size: 0.9rem; padding: 0 12px; }
            .search-box button { padding: 0 16px; font-size: 0.82rem; }
            .cc-name { font-size: 1rem; }
            .cc-meta { gap: 4px; }
            .cc-links { flex-wrap: wrap; }
            .outreach-body { max-height: 120px; }
            .empty-state { padding: 60px 16px; }
            .empty-state h3 { font-size: 1.2rem; }
        }
    </style>
</head>

        <div class="header-left">
            <a href="index.html" class="logo">CastNet</a>
        </div>
        <nav class="header-nav">
            <a href="app.html" class="nav-link active">Dashboard</a>
            <a href="how-it-works.html" class="nav-link">How It Works</a>

            </a>
        </nav>
    </div>

    <div class="search-wrap">
        <div class="search-inner">
            <div class="search-label">Find Your Dream Job</div>
            <div class="mode-toggle">
                <button class="mode-pill active" data-mode="general" onclick="setMode('general')">General</button>
                <button class="mode-pill" data-mode="ds_ml" onclick="setMode('ds_ml')">DS / ML</button>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Find your dream job..." onkeydown="if(event.key==='Enter')onSearch()" />

            </div>
        </div>
    </div>

    <div class="main">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">Search History</div>
            <div id="sessionList"></div>
        </div>
        <div class="content" id="content">
            <div class="empty-state">
                <h3>Cast Your Net</h3>
                <p>Describe what you're looking for in natural language. CastNet will discover companies, research them, analyze your fit, suggest tools to build, find contacts, and draft outreach.</p>
            </div>
        </div>
    </div>

<script>
// =========================================================================
// CONFIG
// =========================================================================
const STEPS = [
    { key: 'discovery', label: 'Discovery' },
    { key: 'research', label: 'Research' },
    { key: 'skills', label: 'Skills' },
    { key: 'tools', label: 'Tools' },
    { key: 'contact', label: 'Contacts' },
    { key: 'resume', label: 'Resume' },
    { key: 'outreach', label: 'Outreach' },
    { key: 'excel', label: 'Export' },
];

const TABS = [
    { key: 'research', label: 'Research' },
    { key: 'skills', label: 'Skills' },
    { key: 'tools', label: 'Suggested Tools to Build' },
    { key: 'contacts', label: 'Contacts' },
    { key: 'resume', label: 'Resume' },
    { key: 'outreach', label: 'Outreach' },
];

// =========================================================================
// STATE
// =========================================================================
const API_BASE = localStorage.getItem('castnet_api') || 'https://castnet-api.fly.dev';

const S = {
    url: API_BASE,
    runId: null,
    sessions: [],
    ws: null,
    steps: {},
    expanded: {},       // companyName -> true/false
    activeTab: {},      // companyName -> tab key
    data: { companies: [], profiles: [], skills: [], contacts: [], resumes: [], drafts: [], tool_suggestions: [] },
    uploadedResume: null,
    searchMode: 'general',
    searchStartTime: null,
    searchTimerInterval: null,
};

// =========================================================================
// API
// =========================================================================
async function api(path, opts = {}) {
    const r = await fetch(S.url + path, { headers: { 'Content-Type': 'application/json' }, ...opts });
    if (!r.ok) throw new Error(`${r.status}`);
    return r;
}
const json = (p, o) => api(p, o).then(r => r.json());

async function fetchAll(rid) {
    const [co, pr, sk, ct, rs, dr, ts] = await Promise.all([
        json(`/sessions/${rid}/companies`),
        json(`/sessions/${rid}/profiles`),
        json(`/sessions/${rid}/skills`),
        json(`/sessions/${rid}/contacts`),
        json(`/sessions/${rid}/resumes`),
        json(`/sessions/${rid}/drafts`),
        json(`/sessions/${rid}/tool-suggestions`),
    ]);
    return {
        companies: co.companies || [], profiles: pr.profiles || [],
        skills: sk.skills || [], contacts: ct.contacts || [],
        resumes: rs.resumes || [], drafts: dr.drafts || [],
        tool_suggestions: ts.tool_suggestions || [],
    };
}

// =========================================================================
// WEBSOCKET
// =========================================================================
function wsUrl(runId) {
    const base = S.url.replace(/^http/, 'ws');
    return `${base}/ws/${runId}`;
}

function wsConnect(rid) {
    if (S.ws) try { S.ws.close(); } catch {}
    const ws = new WebSocket(wsUrl(rid));
    S.ws = ws;
    ws.onmessage = e => {
        try {
            const m = JSON.parse(e.data);
            for (const s of STEPS) {
                if (m.event === s.key + '_start') { S.steps[s.key] = 'active'; render(); return; }
                if (m.event === s.key + '_complete') { S.steps[s.key] = 'done'; loadData(S.runId); return; }
            }
            if (m.event === 'pipeline_complete' || m.event === 'complete') {
                stopTimer();
                const elapsed = S.searchStartTime ? fmtElapsed(Date.now() - S.searchStartTime) : '';
                toast(elapsed ? `Pipeline completed in ${elapsed}!` : 'Pipeline completed!', 'success');
                loadData(S.runId); loadSessions();
            }
            if (m.event === 'error') { stopTimer(); toast('Error: ' + (m.data?.message || ''), 'error'); loadSessions(); }
        } catch {}
    };
    ws.onclose = () => { S.ws = null; };
}

// =========================================================================
// HELPERS
// =========================================================================
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
function jp(s) { try { return JSON.parse(s || '{}'); } catch { return {}; } }
function initials(name) { return (name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2); }
function pct(v) { return Math.round((v || 0) * 100); }
function toast(msg, type = 'info') {
    const c = document.getElementById('toasts'), el = document.createElement('div');
    el.className = 'toast ' + type; el.textContent = msg;
    c.appendChild(el); setTimeout(() => el.remove(), 4000);
}
function alColor(v) {
    if (v >= 0.7) return 'var(--green)';
    if (v >= 0.4) return 'var(--accent)';
    return 'var(--red)';
}
function fmtDomain(d) { return (d || '').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()); }
function fmtElapsed(ms) {
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
}
function getSessionElapsed(sess) {
    if (!sess.created_at) return '';
    if (sess.ended_at) {
        return fmtElapsed(new Date(sess.ended_at) - new Date(sess.created_at));
    }
    if (sess.status === 'running' && S.searchStartTime && sess.run_id === S.runId) {
        return fmtElapsed(Date.now() - S.searchStartTime);
    }
    return '';
}
function fmtFunding(f) { return (f || 'unknown').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()); }

function setMode(mode) {
    S.searchMode = mode;
    document.querySelectorAll('.mode-pill').forEach(p => {
        p.classList.toggle('active', p.dataset.mode === mode);
    });
}

// Construct a Google search URL for careers
function careersUrl(name, website) {
    if (website) {
        try {
            const u = new URL(website);
            return u.origin + '/careers';
        } catch {}
    }
    return 'https://www.google.com/search?q=' + encodeURIComponent(name + ' careers jobs');
}

// Lookup helpers
function profileFor(name) { return S.data.profiles.find(p => jp(p.data_json).company_name === name) || null; }
function skillsFor(name) { return S.data.skills.find(s => s.company_name === name) || null; }
function contactsFor(name) { return S.data.contacts.filter(c => c.company_name === name); }
function resumeFor(name) { return S.data.resumes.find(r => r.company_name === name) || null; }
function draftsFor(name) { return S.data.drafts.filter(d => d.company_name === name); }
function toolsFor(name) {
    return S.data.tool_suggestions.filter(t => {
        const td = jp(t.data_json);
        return td.company_name === name || t.company_name === name;
    });
}

// =========================================================================
// RENDER
// =========================================================================
function render() {
    renderSidebar();
    renderContent();
}

function renderSidebar() {
    const el = document.getElementById('sessionList');
    if (!S.sessions.length) { el.innerHTML = '<div style="padding:14px;color:var(--text-dim);font-size:0.82rem;">No searches yet</div>'; return; }
    el.innerHTML = S.sessions.map(s => {
        const a = s.run_id === S.runId ? ' active' : '';
        const t = s.created_at ? new Date(s.created_at).toLocaleDateString() : '';
        const elapsed = getSessionElapsed(s);
        const timerHtml = elapsed ? `<span class="session-timer">${elapsed}</span>` : '';
        const modeText = (s.search_mode === 'ds_ml') ? 'ds/ml' : 'general';
        return `<div class="session-item${a}" onclick="onSession('${s.run_id}')">
            <div class="session-query">${esc(s.query)}</div>
            <div class="session-meta"><span>${modeText} &middot; ${t}</span>${timerHtml}<span class="badge badge-${s.status}">${s.status}</span><button class="session-copy" onclick="copyPrompt(event,'${esc(s.query).replace(/'/g, "\\'")}')" title="Copy prompt">Copy</button><button class="session-del" onclick="onDeleteSession(event,'${s.run_id}')" title="Delete">&#x2715;</button></div>
        </div>`;
    }).join('');
}

function renderContent() {
    const el = document.getElementById('content');
    if (!S.runId) {
        el.innerHTML = `<div class="empty-state"><h3>Cast Your Net</h3><p>Describe what you're looking for in natural language. CastNet will discover companies, research them, analyze your fit, suggest tools to build, find contacts, and draft outreach.</p></div>`;
        return;
    }

    let html = renderStepper();
    html += renderStats();

    if (S.data.companies.length) {
        S.data.companies.forEach(c => { html += renderCompanyCard(c); });
    } else {
        html += '<div class="empty-state" style="padding:50px"><p>Waiting for results...</p></div>';
    }

    el.innerHTML = html;
}

function renderStepper() {
    let h = '<div class="stepper">';
    STEPS.forEach((s, i) => {
        const st = S.steps[s.key] || '';
        const check = st === 'done' ? '&#10003;' : (i + 1);
        h += `<div class="step-node"><div class="step-circle ${st}">${check}</div><div class="step-label">${s.label}</div></div>`;
        if (i < STEPS.length - 1) h += `<div class="step-conn${st === 'done' ? ' done' : ''}"></div>`;
    });
    return h + '</div>';
}

function renderStats() {
    const d = S.data;
    const nCo = d.companies.length, nPr = d.profiles.length, nSk = d.skills.length;
    const nTs = d.tool_suggestions.length, nCt = d.contacts.length, nDr = d.drafts.length;
    if (!nCo) return '';
    const sess = S.sessions.find(s => s.run_id === S.runId);
    const elapsed = sess ? getSessionElapsed(sess) : '';
    let h = '<div class="stats-bar">';
    if (elapsed) h += `<div class="stat"><span class="stat-num" id="elapsedTimer">${elapsed}</span><span class="stat-label">Elapsed</span></div>`;
    h += `<div class="stat"><span class="stat-num">${nCo}</span><span class="stat-label">Companies</span></div>`;
    if (nPr) h += `<div class="stat"><span class="stat-num">${nPr}</span><span class="stat-label">Profiled</span></div>`;
    if (nSk) h += `<div class="stat"><span class="stat-num">${nSk}</span><span class="stat-label">Analyzed</span></div>`;
    if (nTs) h += `<div class="stat"><span class="stat-num">${nTs}</span><span class="stat-label">Tools</span></div>`;
    if (nCt) h += `<div class="stat"><span class="stat-num">${nCt}</span><span class="stat-label">Contacts</span></div>`;
    if (nDr) h += `<div class="stat"><span class="stat-num">${nDr}</span><span class="stat-label">Drafts</span></div>`;
    h += `<button class="btn btn-accent" onclick="onDownloadExcel()" style="margin-left:auto">Download Excel</button>`;
    h += '</div>';
    return h;
}

function renderCompanyCard(c) {
    const d = jp(c.data_json);
    const name = c.name;
    const open = S.expanded[name];
    const prof = profileFor(name);
    const pd = prof ? jp(prof.data_json) : {};
    const tab = S.activeTab[name] || 'research';

    let h = `<div class="company-card">`;

    // ---- HEADER ----
    h += `<div class="cc-header" onclick="toggleCompany('${esc(name)}')">`;
    h += `<div style="flex:1;min-width:0">`;
    h += `<div class="cc-name">${esc(name)}</div>`;
    h += `<div class="cc-meta">`;
    if (c.domain || d.domain) h += `<span class="cc-tag cc-tag-domain">${fmtDomain(c.domain || d.domain)}</span>`;
    h += `<span class="cc-tag cc-tag-conf">${pct(c.confidence)}% match</span>`;
    if (pd.funding_stage && pd.funding_stage !== 'unknown') h += `<span class="cc-tag cc-tag-funding">${fmtFunding(pd.funding_stage)}</span>`;
    if (pd.headquarters) h += `<span class="cc-tag cc-tag-hq">${esc(pd.headquarters)}</span>`;
    if (pd.employee_count) h += `<span class="cc-tag cc-tag-size">${esc(pd.employee_count)} emp</span>`;
    h += `</div>`;
    if (d.relevance_reason) h += `<div class="cc-reason">${esc(d.relevance_reason)}</div>`;
    // Links row
    h += `<div class="cc-links">`;
    if (c.website) h += `<a class="cc-link-btn" href="${esc(c.website)}" target="_blank" onclick="event.stopPropagation()">Website</a>`;
    h += `<a class="cc-link-btn careers" href="${esc(careersUrl(name, c.website))}" target="_blank" onclick="event.stopPropagation()">Careers</a>`;
    h += `</div>`;
    h += `</div>`;
    h += `<div class="cc-right"><div class="cc-expand${open ? ' open' : ''}">&#9660;</div></div>`;
    h += `</div>`;

    // ---- BODY (expanded with tabs) ----
    if (open) {
        // Tab bar
        h += `<div class="cc-tabs">`;
        TABS.forEach(t => {
            const active = tab === t.key ? ' active' : '';
            h += `<div class="cc-tab${active}" onclick="switchTab('${esc(name)}','${t.key}')">${t.label}</div>`;
        });
        h += `</div>`;

        // Tab content
        h += `<div class="cc-tab-content">`;
        if (tab === 'research') h += renderResearchTab(name, pd);
        else if (tab === 'skills') h += renderSkillsTab(name);
        else if (tab === 'tools') h += renderToolsTab(name);
        else if (tab === 'contacts') h += renderContactsTab(name);
        else if (tab === 'resume') h += renderResumeTab(name);
        else if (tab === 'outreach') h += renderOutreachTab(name);
        h += `</div>`;
    }

    h += `</div>`;
    return h;
}

// ---- TAB RENDERERS ----

function renderResearchTab(name, pd) {
    if (!Object.keys(pd).length || Object.keys(pd).length <= 1) return '<div class="section-empty">Research data not yet available for this company.</div>';
    let h = '<div class="research-grid">';
    if (pd.r_and_d_approach) h += `<div class="rg-item rg-full"><div class="rg-label">R&D Approach</div><div class="rg-value">${esc(pd.r_and_d_approach)}</div></div>`;
    if (pd.culture) h += `<div class="rg-item"><div class="rg-label">Culture</div><div class="rg-value">${esc(pd.culture)}</div></div>`;
    if (pd.engineering_blog) h += `<div class="rg-item"><div class="rg-label">Eng Blog</div><div class="rg-value"><a href="${esc(pd.engineering_blog)}" target="_blank">${esc(pd.engineering_blog)}</a></div></div>`;
    if (pd.ml_use_cases?.length) h += `<div class="rg-item"><div class="rg-label">ML Use Cases</div><ul class="rg-list">${pd.ml_use_cases.map(x => `<li>${esc(x)}</li>`).join('')}</ul></div>`;
    if (pd.notable_clients?.length) h += `<div class="rg-item"><div class="rg-label">Notable Clients</div><ul class="rg-list">${pd.notable_clients.map(x => `<li>${esc(x)}</li>`).join('')}</ul></div>`;
    if (pd.hiring_signals?.length) h += `<div class="rg-item rg-full"><div class="rg-label">Hiring Signals</div><ul class="rg-list">${pd.hiring_signals.map(x => `<li>${esc(x)}</li>`).join('')}</ul></div>`;
    h += '</div>';
    return h;
}

function renderSkillsTab(name) {
    const sk = skillsFor(name);
    if (!sk) return '<div class="section-empty">Skills analysis not yet available for this company.</div>';
    const sd = jp(sk.data_json);
    const score = sk.alignment_score || sd.alignment_score || 0;
    let h = '';
    h += `<div style="font-size:0.95rem;font-weight:700;margin-bottom:8px">Alignment Score: <span style="color:${alColor(score)}">${pct(score)}%</span></div>`;
    h += `<div class="alignment-bar"><div class="alignment-fill" style="width:${pct(score)}%;background:${alColor(score)}"></div></div>`;
    if (sd.tools_used?.length || sd.ml_frameworks?.length) {
        h += `<div style="margin-top:14px"><div class="rg-label">Their Tech Stack</div><div class="chips-row" style="margin-top:6px">`;
        (sd.tools_used || []).concat(sd.ml_frameworks || []).forEach(t => { h += `<span class="chip">${esc(t)}</span>`; });
        h += `</div></div>`;
    }
    if (sd.cloud_platform) h += `<div style="margin-top:10px"><div class="rg-label">Cloud Platform</div><span class="chip" style="margin-top:4px;display:inline-block">${esc(sd.cloud_platform)}</span></div>`;
    if (sd.skills_to_learn?.length) {
        h += `<div style="margin-top:14px"><div class="rg-label">Skills to Build</div><div class="chips-row" style="margin-top:6px">`;
        sd.skills_to_learn.forEach(t => { h += `<span class="chip learn">${esc(t)}</span>`; });
        h += `</div></div>`;
    }
    if (sd.gap_analysis) h += `<div style="margin-top:12px;font-size:0.84rem;color:var(--text-muted);line-height:1.6">${esc(sd.gap_analysis)}</div>`;
    return h;
}

function renderToolsTab(name) {
    const tools = toolsFor(name);
    if (!tools.length) return '<div class="section-empty">Tool suggestions not yet available for this company.</div>';
    let h = '';
    tools.forEach(t => {
        const td = jp(t.data_json);
        h += `<div class="tool-card">`;
        h += `<div class="tool-card-name">${esc(td.tool_name || t.tool_name)}</div>`;
        if (td.description) h += `<div class="tool-card-desc">${esc(td.description)}</div>`;
        if (td.why_impressive) h += `<div class="tool-card-why">${esc(td.why_impressive)}</div>`;
        h += `<div class="tool-card-row">`;
        if (td.estimated_revenue_impact) h += `<span class="tool-card-revenue">${esc(td.estimated_revenue_impact)}</span>`;
        if (S.uploadedResume) {
            h += `<button class="btn btn-accent btn-sm" onclick="onTailorResume(event,'${esc(name)}','${esc(td.tool_name || '')}','${esc((td.description || '').replace(/'/g, "\\'"))}')">Tailor Resume for This</button>`;
        }
        h += `</div></div>`;
    });
    return h;
}

function renderContactsTab(name) {
    const cts = contactsFor(name);
    if (!cts.length) return '<div class="section-empty">Contact information not yet available for this company.</div>';
    let h = '';
    cts.forEach(ct => {
        h += `<div class="contact-row">`;
        h += `<div class="contact-avatar">${initials(ct.name)}</div>`;
        h += `<div class="contact-info"><div class="contact-name">${esc(ct.name)}</div><div class="contact-title">${esc(ct.title)}</div></div>`;
        h += `<div class="contact-links">`;
        if (ct.email) h += `<a href="mailto:${esc(ct.email)}">${esc(ct.email)}</a>`;
        if (ct.linkedin_url) h += `<a href="${esc(ct.linkedin_url)}" target="_blank">LinkedIn</a>`;
        h += `</div></div>`;
    });
    return h;
}

function renderResumeTab(name) {
    const resume = resumeFor(name);
    const rd = resume ? jp(resume.data_json) : {};
    let h = '';

    // Upload area
    h += '<div class="resume-upload-area">';
    h += '<input type="file" id="resumeFileInput" accept=".pdf,.docx" style="display:none" onchange="onResumeUpload(event)" />';
    h += `<button class="btn btn-outline" onclick="document.getElementById('resumeFileInput').click()">Upload Resume</button>`;
    if (S.uploadedResume) {
        h += `<span class="filename">${esc(S.uploadedResume.filename)}</span>`;
        h += `<span class="preview">${esc((S.uploadedResume.content_text || '').slice(0, 120))}...</span>`;
    } else {
        h += `<span style="font-size:0.82rem;color:var(--text-dim)">Upload PDF/DOCX to enable per-tool resume tailoring</span>`;
    }
    h += '</div>';

    // Tailored resume content
    if (resume) {
        h += '<div class="resume-content">';
        if (rd.tailored_summary) h += `<div style="font-size:0.88rem;color:var(--text-muted);margin-bottom:10px;line-height:1.6">${esc(rd.tailored_summary)}</div>`;
        if (rd.emphasis_areas?.length) {
            h += `<div class="rg-label" style="margin-bottom:6px">Emphasis Areas</div><div class="chips-row" style="margin-bottom:10px">`;
            rd.emphasis_areas.forEach(a => { h += `<span class="chip">${esc(a)}</span>`; });
            h += `</div>`;
        }
        if (rd.tailored_bullets?.length) {
            h += `<div class="rg-label" style="margin-bottom:6px">Tailored Bullets</div>`;
            h += `<ul style="padding-left:16px;font-size:0.84rem;color:var(--text-muted);line-height:1.7">`;
            rd.tailored_bullets.forEach(b => { h += `<li style="margin-bottom:4px">${esc(b)}</li>`; });
            h += `</ul>`;
        }
        h += '</div>';
    } else if (S.uploadedResume) {
        h += '<div class="section-empty">No tailored resume yet. Go to "Suggested Tools to Build" tab and click "Tailor Resume for This" on any tool.</div>';
    } else {
        h += '<div class="section-empty">Upload your resume above, then use the "Suggested Tools to Build" tab to tailor it per company.</div>';
    }
    return h;
}

function renderOutreachTab(name) {
    const drs = draftsFor(name);
    if (!drs.length) return '<div class="section-empty">Outreach drafts not yet available for this company.</div>';
    let h = '';
    drs.forEach(dr => {
        const isDraft = dr.status === 'draft';
        h += `<div class="outreach-card">`;
        h += `<div style="display:flex;justify-content:space-between;align-items:center">`;
        h += `<div class="outreach-subject">${esc(dr.subject || 'No subject')}</div>`;
        h += `<span class="badge badge-${isDraft ? 'running' : 'completed'}">${dr.status}</span>`;
        h += `</div>`;
        if (dr.contact_name) h += `<div style="font-size:0.78rem;color:var(--text-dim);margin-top:2px">To: ${esc(dr.contact_name)}</div>`;
        h += `<div class="outreach-body">${esc(dr.body)}</div>`;
        if (isDraft) h += `<div class="outreach-actions"><button class="btn btn-green btn-sm" onclick="onApprove(event,${dr.id})">Approve Draft</button></div>`;
        h += `</div>`;
    });
    return h;
}

// =========================================================================
// EVENTS
// =========================================================================
function switchTab(name, tabKey) {
    S.activeTab[name] = tabKey;
    renderContent();
}

async function onSearch() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) return;
    document.getElementById('searchBtn').disabled = true;
    try {
        const r = await json('/search', { method: 'POST', body: JSON.stringify({ query: q, search_mode: S.searchMode }) });
        S.runId = r.run_id; S.steps = {}; S.expanded = {}; S.activeTab = {};
        S.data = { companies: [], profiles: [], skills: [], contacts: [], resumes: [], drafts: [], tool_suggestions: [] };
        S.searchStartTime = Date.now();
        if (S.searchTimerInterval) clearInterval(S.searchTimerInterval);
        S.searchTimerInterval = setInterval(() => { renderSidebar(); updateElapsedTimer(); }, 1000);
        toast('Search started', 'info');
        wsConnect(r.run_id); render(); await loadSessions();
    } catch (e) { toast('Search failed: ' + e.message, 'error'); }
    finally { document.getElementById('searchBtn').disabled = false; }
}
function updateElapsedTimer() {
    const el = document.getElementById('elapsedTimer');
    if (el && S.searchStartTime) el.textContent = fmtElapsed(Date.now() - S.searchStartTime);
}
function stopTimer() {
    if (S.searchTimerInterval) { clearInterval(S.searchTimerInterval); S.searchTimerInterval = null; }
}

async function onSession(rid) {
    S.runId = rid; S.steps = {}; S.expanded = {}; S.activeTab = {};
    renderSidebar();
    await loadData(rid);
    const sess = S.sessions.find(s => s.run_id === rid);
    if (sess?.status === 'running') wsConnect(rid);
}

function toggleCompany(name) {
    S.expanded[name] = !S.expanded[name];
    if (S.expanded[name] && !S.activeTab[name]) S.activeTab[name] = 'research';
    renderContent();
}

async function onApprove(evt, draftId) {
    evt.stopPropagation();
    try {
        await json(`/sessions/${S.runId}/approve-draft/${draftId}`, { method: 'POST' });
        toast('Draft approved', 'success'); await loadData(S.runId);
    } catch (e) { toast('Failed: ' + e.message, 'error'); }
}

function copyPrompt(evt, query) {
    evt.stopPropagation();
    navigator.clipboard.writeText(query).then(() => {
        const btn = evt.currentTarget;
        btn.classList.add('copied');
        btn.textContent = 'Copied';
        setTimeout(() => { btn.classList.remove('copied'); btn.textContent = 'Copy'; }, 1500);
    });
}

async function onDeleteSession(evt, rid) {
    evt.stopPropagation();
    if (!confirm('Delete this search session?')) return;
    try {
        await api(`/sessions/${rid}`, { method: 'DELETE' });
        S.sessions = S.sessions.filter(s => s.run_id !== rid);
        if (S.runId === rid) { S.runId = null; S.data = { companies:[], profiles:[], skills:[], contacts:[], resumes:[], drafts:[], tool_suggestions:[] }; }
        toast('Session deleted', 'success'); render();
    } catch (e) { toast('Delete failed: ' + e.message, 'error'); }
}

async function onDownloadExcel() {
    try {
        const r = await fetch(S.url + `/sessions/${S.runId}/excel`);
        if (!r.ok) { toast('Excel not available yet', 'error'); return; }
        const b = await r.blob(), a = document.createElement('a');
        a.href = URL.createObjectURL(b); a.download = `castnet_${S.runId.slice(0,8)}.xlsx`;
        a.click(); URL.revokeObjectURL(a.href); toast('Downloaded', 'success');
    } catch (e) { toast('Download failed', 'error'); }
}

// =========================================================================
// RESUME UPLOAD & TOOL TAILORING
// =========================================================================
async function onResumeUpload(evt) {
    const file = evt.target.files[0];
    if (!file) return;
    const formData = new FormData();
    formData.append('file', file);
    try {
        const r = await fetch(S.url + '/upload-resume', { method: 'POST', body: formData });
        if (!r.ok) { const e = await r.json(); toast(e.error || 'Upload failed', 'error'); return; }
        const data = await r.json();
        S.uploadedResume = { filename: data.filename, content_text: data.content_text, id: data.id };
        toast('Resume uploaded', 'success');
        render();
    } catch (e) { toast('Upload failed: ' + e.message, 'error'); }
}

async function onTailorResume(evt, company, toolName, toolDesc) {
    evt.stopPropagation();
    const btn = evt.target;
    btn.disabled = true; btn.textContent = 'Tailoring...';
    try {
        await json(`/sessions/${S.runId}/update-resume-for-tool`, {
            method: 'POST',
            body: JSON.stringify({ company_name: company, tool_name: toolName, tool_description: toolDesc }),
        });
        toast(`Resume tailored for ${toolName}`, 'success');
        await loadData(S.runId);
    } catch (e) { toast('Tailoring failed: ' + e.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Tailor Resume for This'; }
}

// =========================================================================
// LOADERS
// =========================================================================
async function loadSessions() { try { S.sessions = (await json('/sessions')).sessions || []; renderSidebar(); } catch {} }
async function loadData(rid) { try { S.data = await fetchAll(rid); render(); } catch { toast('Failed to load data', 'error'); } }
async function loadUploadedResume() {
    try {
        const r = await json('/uploaded-resume');
        if (r.resume) S.uploadedResume = { filename: r.resume.filename, content_text: r.resume.content_text, id: r.resume.id };
    } catch {}
}

// =========================================================================
// INIT
// =========================================================================
document.addEventListener('DOMContentLoaded', async () => {
    await loadSessions();
    try {
        const h = await json('/health');
        console.log('Backend connected:', h);
        await loadUploadedResume();
    } catch (e) {
        console.warn('Backend not reachable:', e.message);
    }
});
</script>
</body>
</html>
