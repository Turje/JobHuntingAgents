<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CastNet</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-hover: #1c2129;
            --surface-raised: #1e252e;
            --border: #30363d;
            --border-light: #3d444d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --text-dim: #656d76;
            --accent: #58a6ff;
            --accent-green: #3fb950;
            --accent-purple: #bc8cff;
            --accent-orange: #d29922;
            --accent-red: #f85149;
            --accent-teal: #39d2c0;
            --radius: 10px;
            --radius-sm: 6px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        button { cursor: pointer; font-family: inherit; }
        input { font-family: inherit; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ---- HEADER ---- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            gap: 16px;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-title { font-size: 1.15rem; font-weight: 700; color: var(--accent); }
        .connect-bar { display: flex; align-items: center; gap: 8px; }
        .connect-bar input {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text);
            padding: 5px 10px; width: 200px; font-size: 0.8rem;
        }
        .connect-bar button {
            background: var(--accent); color: var(--bg); border: none;
            border-radius: var(--radius-sm); padding: 5px 14px;
            font-size: 0.8rem; font-weight: 600;
        }
        .status-dot {
            width: 9px; height: 9px; border-radius: 50%;
            background: var(--accent-red); flex-shrink: 0;
        }
        .status-dot.connected { background: var(--accent-green); }
        .status-dot.connecting { background: var(--accent-orange); }
        .mode-badge {
            font-size: 0.65rem; padding: 2px 8px; border-radius: 10px;
            font-weight: 700; letter-spacing: 0.3px; text-transform: uppercase;
        }
        .mode-badge.dspy { background: rgba(188,140,255,0.2); color: var(--accent-purple); }
        .mode-badge.claude { background: rgba(88,166,255,0.15); color: var(--accent); }
        .mode-badge.gemini { background: rgba(63,185,80,0.15); color: var(--accent-green); }

        /* ---- SEARCH ---- */
        .search-section {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex; gap: 10px;
            max-width: 900px; margin: 0 auto; width: 100%;
        }
        .search-section input {
            flex: 1; background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); color: var(--text);
            padding: 12px 18px; font-size: 1rem;
        }
        .search-section input:focus { outline: none; border-color: var(--accent); }
        .search-section button {
            background: var(--accent-green); color: var(--bg); border: none;
            border-radius: var(--radius); padding: 12px 28px;
            font-weight: 700; font-size: 1rem; white-space: nowrap;
        }
        .search-section button:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ---- LAYOUT ---- */
        .main { display: flex; height: calc(100vh - 114px); }

        /* ---- SIDEBAR ---- */
        .sidebar {
            width: 240px; min-width: 240px; border-right: 1px solid var(--border);
            overflow-y: auto; background: var(--surface);
        }
        .sidebar-header {
            padding: 10px 14px; font-size: 0.75rem; font-weight: 600;
            color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.6px;
            border-bottom: 1px solid var(--border);
        }
        .session-item {
            padding: 9px 14px; border-bottom: 1px solid var(--border);
            cursor: pointer; font-size: 0.82rem; transition: background 0.1s;
        }
        .session-item:hover { background: var(--surface-hover); }
        .session-item.active { background: var(--bg); border-left: 3px solid var(--accent); }
        .session-query { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
        .session-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 3px; font-size: 0.7rem; color: var(--text-dim); }
        .session-del {
            opacity: 0; background: none; border: none; color: var(--accent-red);
            font-size: 0.85rem; padding: 0 4px; cursor: pointer; transition: opacity 0.15s;
        }
        .session-item:hover .session-del { opacity: 0.7; }
        .session-del:hover { opacity: 1 !important; }
        .badge { font-size: 0.65rem; padding: 1px 6px; border-radius: 10px; font-weight: 600; }
        .badge-running { background: rgba(210,153,34,0.2); color: var(--accent-orange); }
        .badge-completed { background: rgba(63,185,80,0.2); color: var(--accent-green); }
        .badge-failed { background: rgba(248,81,73,0.2); color: var(--accent-red); }

        /* ---- CONTENT ---- */
        .content { flex: 1; overflow-y: auto; padding: 24px; }

        /* ---- STEPPER ---- */
        .stepper {
            display: flex; align-items: center; gap: 0;
            padding: 14px 18px; background: var(--surface);
            border: 1px solid var(--border); border-radius: var(--radius);
            margin-bottom: 20px; overflow-x: auto;
        }
        .step-node { display: flex; flex-direction: column; align-items: center; gap: 3px; min-width: 70px; }
        .step-circle {
            width: 30px; height: 30px; border-radius: 50%;
            border: 2px solid var(--border); display: flex;
            align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 700; color: var(--text-dim); transition: all 0.3s;
        }
        .step-circle.active { border-color: var(--accent-orange); color: var(--accent-orange); animation: pulse 1.5s infinite; }
        .step-circle.done { border-color: var(--accent-green); background: var(--accent-green); color: var(--bg); }
        .step-label { font-size: 0.65rem; color: var(--text-dim); }
        .step-conn { flex: 1; height: 2px; background: var(--border); min-width: 12px; }
        .step-conn.done { background: var(--accent-green); }
        @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(210,153,34,.4); } 50% { box-shadow: 0 0 0 5px rgba(210,153,34,0); } }

        /* ---- STATS BAR ---- */
        .stats-bar {
            display: flex; gap: 12px; flex-wrap: wrap;
            margin-bottom: 20px; align-items: center;
        }
        .stat {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 8px 14px;
            font-size: 0.82rem; display: flex; align-items: center; gap: 6px;
        }
        .stat-num { font-weight: 700; font-size: 1.1rem; }
        .stat-label { color: var(--text-muted); }
        .btn {
            padding: 7px 16px; border: none; border-radius: var(--radius-sm);
            font-size: 0.82rem; font-weight: 600;
        }
        .btn-accent { background: var(--accent); color: var(--bg); }
        .btn-green { background: var(--accent-green); color: var(--bg); }
        .btn-outline {
            background: transparent; border: 1px solid var(--border);
            color: var(--text-muted);
        }
        .btn:hover { opacity: 0.85; }

        /* ---- COMPANY CARD ---- */
        .company-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); margin-bottom: 16px; overflow: hidden;
        }
        .cc-header {
            padding: 16px 20px; display: flex; align-items: flex-start;
            justify-content: space-between; gap: 16px; cursor: pointer;
        }
        .cc-header:hover { background: var(--surface-hover); }
        .cc-name { font-size: 1.1rem; font-weight: 700; }
        .cc-meta { display: flex; gap: 8px; align-items: center; margin-top: 4px; flex-wrap: wrap; }
        .cc-tag {
            font-size: 0.7rem; padding: 2px 8px; border-radius: 4px;
            font-weight: 600;
        }
        .cc-tag-domain { background: rgba(88,166,255,0.12); color: var(--accent); }
        .cc-tag-conf { background: rgba(63,185,80,0.12); color: var(--accent-green); }
        .cc-tag-funding { background: rgba(188,140,255,0.12); color: var(--accent-purple); }
        .cc-tag-hq { background: rgba(210,153,34,0.12); color: var(--accent-orange); }
        .cc-tag-size { background: rgba(57,210,192,0.12); color: var(--accent-teal); }
        .cc-reason { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }
        .cc-website { color: var(--accent); font-size: 0.8rem; }
        .cc-expand { color: var(--text-dim); font-size: 1.3rem; padding: 4px; transition: transform 0.2s; user-select: none; }
        .cc-expand.open { transform: rotate(180deg); }

        .cc-body { border-top: 1px solid var(--border); padding: 0 20px 20px; }
        .cc-section { margin-top: 18px; }
        .cc-section-title {
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 8px;
            display: flex; align-items: center; gap: 6px;
        }
        .cc-section-title .icon { font-size: 0.9rem; }

        /* Research grid */
        .research-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .rg-item { background: var(--bg); border-radius: var(--radius-sm); padding: 10px 12px; }
        .rg-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 2px; }
        .rg-value { font-size: 0.85rem; }
        .rg-list { list-style: none; padding: 0; }
        .rg-list li { font-size: 0.82rem; padding: 1px 0; }
        .rg-list li::before { content: ""; display: inline-block; width: 4px; height: 4px; border-radius: 50%; background: var(--accent); margin-right: 6px; vertical-align: middle; }
        .rg-full { grid-column: 1 / -1; }

        /* Skills / Tools */
        .tools-row { display: flex; flex-wrap: wrap; gap: 5px; }
        .tool-chip {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 4px; padding: 2px 8px; font-size: 0.78rem;
        }
        .tool-chip.learn { border-color: var(--accent-orange); color: var(--accent-orange); }
        .alignment-bar {
            height: 6px; border-radius: 3px; background: var(--bg);
            margin-top: 6px; overflow: hidden;
        }
        .alignment-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }

        /* Contact row */
        .contact-row {
            display: flex; align-items: center; gap: 12px;
            padding: 8px 12px; background: var(--bg);
            border-radius: var(--radius-sm); margin-bottom: 6px;
        }
        .contact-avatar {
            width: 34px; height: 34px; border-radius: 50%;
            background: var(--surface-raised); display: flex;
            align-items: center; justify-content: center;
            font-size: 0.8rem; font-weight: 700; color: var(--accent-purple);
            flex-shrink: 0;
        }
        .contact-info { flex: 1; min-width: 0; }
        .contact-name { font-weight: 600; font-size: 0.88rem; }
        .contact-title { color: var(--text-muted); font-size: 0.78rem; }
        .contact-links { display: flex; gap: 10px; font-size: 0.78rem; }

        /* Outreach */
        .outreach-card {
            background: var(--bg); border-radius: var(--radius-sm);
            padding: 12px; margin-top: 8px;
        }
        .outreach-subject { font-weight: 600; font-size: 0.88rem; margin-bottom: 4px; }
        .outreach-body {
            font-size: 0.82rem; color: var(--text-muted); white-space: pre-wrap;
            word-break: break-word; max-height: 160px; overflow-y: auto;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 4px; padding: 10px; margin-top: 6px;
        }
        .outreach-actions { margin-top: 8px; display: flex; gap: 8px; align-items: center; }

        /* Tool Suggestion card */
        .tool-card {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 12px;
            margin-bottom: 8px;
        }
        .tool-card-name { font-weight: 700; font-size: 0.9rem; color: var(--accent-teal); margin-bottom: 4px; }
        .tool-card-desc { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 6px; }
        .tool-card-why { font-size: 0.8rem; color: var(--text-muted); font-style: italic; margin-bottom: 4px; }
        .tool-card-revenue {
            font-size: 0.75rem; padding: 2px 8px; border-radius: 4px;
            background: rgba(63,185,80,0.12); color: var(--accent-green);
            display: inline-block; font-weight: 600;
        }
        .tool-card-actions { margin-top: 8px; display: flex; gap: 8px; align-items: center; }

        /* Resume upload */
        .resume-upload-bar {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 14px; background: var(--surface);
            border: 1px solid var(--border); border-radius: var(--radius);
            margin-bottom: 16px;
        }
        .resume-upload-bar .filename {
            font-size: 0.85rem; color: var(--accent-green); font-weight: 600;
        }
        .resume-upload-bar .preview {
            font-size: 0.78rem; color: var(--text-dim); max-width: 400px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* ---- EMPTY / TOAST / OVERLAY ---- */
        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
        .empty-state h3 { font-size: 1.3rem; margin-bottom: 8px; color: var(--text); }

        .toast-container { position: fixed; top: 14px; right: 14px; z-index: 1000; display: flex; flex-direction: column; gap: 6px; }
        .toast { padding: 8px 14px; border-radius: var(--radius-sm); font-size: 0.82rem; animation: slideIn 0.25s ease; max-width: 340px; }
        .toast.success { background: rgba(63,185,80,0.9); color: #fff; }
        .toast.error { background: rgba(248,81,73,0.9); color: #fff; }
        .toast.info { background: rgba(88,166,255,0.9); color: #fff; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .overlay { position: fixed; inset: 0; background: rgba(13,17,23,0.85); display: flex; align-items: center; justify-content: center; z-index: 500; }
        .overlay-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px; text-align: center; max-width: 400px; }
        .overlay-box h3 { font-size: 1.15rem; margin-bottom: 10px; }
        .overlay-box p { color: var(--text-muted); font-size: 0.88rem; }
        .overlay-box code { display: block; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 8px; margin: 10px 0; font-size: 0.85rem; color: var(--accent-green); }
        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .header { padding: 8px 12px; }
            .connect-bar input { width: 140px; }
            .research-grid { grid-template-columns: 1fr; }
            .search-section { padding: 14px 12px; }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toasts"></div>
    <div class="overlay hidden" id="overlay">
        <div class="overlay-box">
            <h3>Backend Not Connected</h3>
            <p>Start the backend server:</p>
            <code>uvicorn pylon.main:app --reload</code>
            <p>Then click Connect above.</p>
        </div>
    </div>

    <div class="header">
        <div class="header-left">
            <span class="header-title">CastNet</span>
        </div>
        <div class="connect-bar">
            <span class="mode-badge hidden" id="modeBadge">Gemini</span>
            <div class="status-dot" id="statusDot"></div>
            <input type="text" id="backendUrl" placeholder="http://localhost:8000" />
            <button onclick="onConnect()">Connect</button>
        </div>
    </div>

    <div style="border-bottom:1px solid var(--border)">
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Find your next dream job..." onkeydown="if(event.key==='Enter')onSearch()" />
            <button id="searchBtn" onclick="onSearch()">Search</button>
        </div>
    </div>

    <div class="main">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">Search History</div>
            <div id="sessionList"></div>
        </div>
        <div class="content" id="content">
            <div class="empty-state">
                <h3>Ready to Search</h3>
                <p>Enter a query above to discover companies, analyze skill fit, find decision-makers, and generate outreach.</p>
            </div>
        </div>
    </div>

<script>
// =========================================================================
// CONFIG
// =========================================================================
const STEPS = [
    { key: 'discovery', label: 'Discovery' },
    { key: 'research', label: 'Research' },
    { key: 'skills', label: 'Skills' },
    { key: 'tools', label: 'Tools' },
    { key: 'contact', label: 'Contacts' },
    { key: 'resume', label: 'Resume' },
    { key: 'outreach', label: 'Outreach' },
    { key: 'excel', label: 'Export' },
];

// =========================================================================
// STATE
// =========================================================================
const S = {
    url: '',
    connected: false,
    sessions: [],
    runId: null,
    ws: null,
    steps: {},
    expanded: {},   // companyName -> true/false
    data: { companies: [], profiles: [], skills: [], contacts: [], resumes: [], drafts: [], tool_suggestions: [] },
    uploadedResume: null,
};

// =========================================================================
// API
// =========================================================================
async function api(path, opts = {}) {
    const r = await fetch(S.url + path, { headers: { 'Content-Type': 'application/json' }, ...opts });
    if (!r.ok) throw new Error(`${r.status}`);
    return r;
}
const json = (p, o) => api(p, o).then(r => r.json());

async function fetchAll(rid) {
    const [co, pr, sk, ct, rs, dr, ts] = await Promise.all([
        json(`/sessions/${rid}/companies`),
        json(`/sessions/${rid}/profiles`),
        json(`/sessions/${rid}/skills`),
        json(`/sessions/${rid}/contacts`),
        json(`/sessions/${rid}/resumes`),
        json(`/sessions/${rid}/drafts`),
        json(`/sessions/${rid}/tool-suggestions`),
    ]);
    return {
        companies: co.companies || [], profiles: pr.profiles || [],
        skills: sk.skills || [], contacts: ct.contacts || [],
        resumes: rs.resumes || [], drafts: dr.drafts || [],
        tool_suggestions: ts.tool_suggestions || [],
    };
}

// =========================================================================
// WEBSOCKET
// =========================================================================
function wsConnect(rid) {
    if (S.ws) try { S.ws.close(); } catch {}
    const ws = new WebSocket(S.url.replace(/^http/, 'ws') + '/ws/' + rid);
    S.ws = ws;
    ws.onmessage = e => {
        try {
            const m = JSON.parse(e.data);
            for (const s of STEPS) {
                if (m.event === s.key + '_start') { S.steps[s.key] = 'active'; render(); return; }
                if (m.event === s.key + '_complete') { S.steps[s.key] = 'done'; loadData(S.runId); return; }
            }
            if (m.event === 'pipeline_complete' || m.event === 'complete') {
                toast('Pipeline completed!', 'success'); loadData(S.runId); loadSessions();
            }
            if (m.event === 'error') { toast('Error: ' + (m.data?.message || ''), 'error'); loadSessions(); }
        } catch {}
    };
    ws.onclose = () => { S.ws = null; };
}

// =========================================================================
// HELPERS
// =========================================================================
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
function jp(s) { try { return JSON.parse(s || '{}'); } catch { return {}; } }
function initials(name) { return (name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2); }
function pct(v) { return Math.round((v || 0) * 100); }
function toast(msg, type = 'info') {
    const c = document.getElementById('toasts'), el = document.createElement('div');
    el.className = 'toast ' + type; el.textContent = msg;
    c.appendChild(el); setTimeout(() => el.remove(), 4000);
}
function setDot(s) {
    const d = document.getElementById('statusDot'); d.className = 'status-dot';
    if (s === 'connected') d.classList.add('connected');
    else if (s === 'connecting') d.classList.add('connecting');
}
function setModeBadge(dspyEnabled, llmProvider) {
    const b = document.getElementById('modeBadge');
    b.classList.remove('hidden', 'dspy', 'claude', 'gemini');
    if (dspyEnabled) { b.textContent = 'DSPy'; b.classList.add('dspy'); }
    else if (llmProvider === 'gemini') { b.textContent = 'GEMINI'; b.classList.add('gemini'); }
    else { b.textContent = 'CLAUDE'; b.classList.add('claude'); }
}
function alColor(v) {
    if (v >= 0.7) return 'var(--accent-green)';
    if (v >= 0.4) return 'var(--accent-orange)';
    return 'var(--accent-red)';
}
function fmtDomain(d) { return (d || '').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()); }
function fmtFunding(f) { return (f || 'unknown').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()); }

// lookup helpers — join data by company name
function profileFor(name) { return S.data.profiles.find(p => jp(p.data_json).company_name === name) || null; }
function skillsFor(name) { return S.data.skills.find(s => s.company_name === name) || null; }
function contactsFor(name) { return S.data.contacts.filter(c => c.company_name === name); }
function resumeFor(name) { return S.data.resumes.find(r => r.company_name === name) || null; }
function draftsFor(name) { return S.data.drafts.filter(d => d.company_name === name); }
function toolsFor(name) {
    return S.data.tool_suggestions.filter(t => {
        const td = jp(t.data_json);
        return td.company_name === name || t.company_name === name;
    });
}

// =========================================================================
// RENDER
// =========================================================================
function render() {
    renderSidebar();
    renderContent();
}

function renderSidebar() {
    const el = document.getElementById('sessionList');
    if (!S.sessions.length) { el.innerHTML = '<div style="padding:14px;color:var(--text-dim);font-size:0.82rem;">No searches yet</div>'; return; }
    el.innerHTML = S.sessions.map(s => {
        const a = s.run_id === S.runId ? ' active' : '';
        const t = s.created_at ? new Date(s.created_at).toLocaleDateString() : '';
        return `<div class="session-item${a}" onclick="onSession('${s.run_id}')">
            <div class="session-query">${esc(s.query)}</div>
            <div class="session-meta"><span>${t}</span><span class="badge badge-${s.status}">${s.status}</span><button class="session-del" onclick="onDeleteSession(event,'${s.run_id}')" title="Delete">&#x2715;</button></div>
        </div>`;
    }).join('');
}

function renderContent() {
    const el = document.getElementById('content');
    if (!S.runId) {
        el.innerHTML = `<div class="empty-state"><h3>Ready to Search</h3><p>Enter a query above to discover companies, analyze skill fit, find decision-makers, and generate outreach.</p></div>`;
        return;
    }

    let html = renderStepper();
    html += renderResumeUpload();
    html += renderStats();

    // Render each company as a rich card
    if (S.data.companies.length) {
        S.data.companies.forEach(c => { html += renderCompanyCard(c); });
    } else {
        html += '<div class="empty-state" style="padding:40px"><p>Waiting for results...</p></div>';
    }

    el.innerHTML = html;
}

function renderStepper() {
    let h = '<div class="stepper">';
    STEPS.forEach((s, i) => {
        const st = S.steps[s.key] || '';
        h += `<div class="step-node"><div class="step-circle ${st}">${i+1}</div><div class="step-label">${s.label}</div></div>`;
        if (i < STEPS.length - 1) h += `<div class="step-conn${st === 'done' ? ' done' : ''}"></div>`;
    });
    return h + '</div>';
}

function renderStats() {
    const d = S.data;
    const nCo = d.companies.length, nPr = d.profiles.length, nSk = d.skills.length;
    const nTs = d.tool_suggestions.length, nCt = d.contacts.length, nDr = d.drafts.length;
    if (!nCo) return '';
    let h = '<div class="stats-bar">';
    h += `<div class="stat"><span class="stat-num">${nCo}</span><span class="stat-label">Companies</span></div>`;
    if (nPr) h += `<div class="stat"><span class="stat-num">${nPr}</span><span class="stat-label">Profiled</span></div>`;
    if (nSk) h += `<div class="stat"><span class="stat-num">${nSk}</span><span class="stat-label">Analyzed</span></div>`;
    if (nTs) h += `<div class="stat"><span class="stat-num">${nTs}</span><span class="stat-label">Tools</span></div>`;
    if (nCt) h += `<div class="stat"><span class="stat-num">${nCt}</span><span class="stat-label">Contacts</span></div>`;
    if (nDr) h += `<div class="stat"><span class="stat-num">${nDr}</span><span class="stat-label">Drafts</span></div>`;
    h += `<button class="btn btn-accent" onclick="onDownloadExcel()" style="margin-left:auto">Download Excel</button>`;
    h += '</div>';
    return h;
}

function renderCompanyCard(c) {
    const d = jp(c.data_json);
    const name = c.name;
    const open = S.expanded[name];
    const prof = profileFor(name);
    const pd = prof ? jp(prof.data_json) : {};
    const sk = skillsFor(name);
    const sd = sk ? jp(sk.data_json) : {};
    const cts = contactsFor(name);
    const resume = resumeFor(name);
    const rd = resume ? jp(resume.data_json) : {};
    const drs = draftsFor(name);

    let h = `<div class="company-card">`;

    // Header
    h += `<div class="cc-header" onclick="toggleCompany('${esc(name)}')">`;
    h += `<div>`;
    h += `<div class="cc-name">${esc(name)}</div>`;
    h += `<div class="cc-meta">`;
    if (c.domain || d.domain) h += `<span class="cc-tag cc-tag-domain">${fmtDomain(c.domain || d.domain)}</span>`;
    h += `<span class="cc-tag cc-tag-conf">${pct(c.confidence)}% match</span>`;
    if (pd.funding_stage && pd.funding_stage !== 'unknown') h += `<span class="cc-tag cc-tag-funding">${fmtFunding(pd.funding_stage)}</span>`;
    if (pd.headquarters) h += `<span class="cc-tag cc-tag-hq">${esc(pd.headquarters)}</span>`;
    if (pd.employee_count) h += `<span class="cc-tag cc-tag-size">${esc(pd.employee_count)} emp</span>`;
    h += `</div>`;
    if (d.relevance_reason) h += `<div class="cc-reason">${esc(d.relevance_reason)}</div>`;
    if (c.website) h += `<div class="cc-website">${esc(c.website)}</div>`;
    h += `</div>`;
    h += `<div class="cc-expand${open ? ' open' : ''}">&#9660;</div>`;
    h += `</div>`;

    // Body (expanded)
    if (open) {
        h += `<div class="cc-body">`;

        // ---- RESEARCH ----
        if (Object.keys(pd).length > 1) {
            h += `<div class="cc-section">`;
            h += `<div class="cc-section-title"><span class="icon">&#128269;</span> Research</div>`;
            h += `<div class="research-grid">`;
            if (pd.r_and_d_approach) h += `<div class="rg-item rg-full"><div class="rg-label">R&D Approach</div><div class="rg-value">${esc(pd.r_and_d_approach)}</div></div>`;
            if (pd.culture) h += `<div class="rg-item"><div class="rg-label">Culture</div><div class="rg-value">${esc(pd.culture)}</div></div>`;
            if (pd.engineering_blog) h += `<div class="rg-item"><div class="rg-label">Eng Blog</div><div class="rg-value"><a href="${esc(pd.engineering_blog)}" target="_blank">${esc(pd.engineering_blog)}</a></div></div>`;
            if (pd.ml_use_cases?.length) h += `<div class="rg-item"><div class="rg-label">ML Use Cases</div><ul class="rg-list">${pd.ml_use_cases.map(x => `<li>${esc(x)}</li>`).join('')}</ul></div>`;
            if (pd.notable_clients?.length) h += `<div class="rg-item"><div class="rg-label">Notable Clients</div><ul class="rg-list">${pd.notable_clients.map(x => `<li>${esc(x)}</li>`).join('')}</ul></div>`;
            if (pd.hiring_signals?.length) h += `<div class="rg-item rg-full"><div class="rg-label">Hiring Signals</div><ul class="rg-list">${pd.hiring_signals.map(x => `<li>${esc(x)}</li>`).join('')}</ul></div>`;
            h += `</div></div>`;
        }

        // ---- SKILLS / YOUR FIT ----
        if (sk) {
            const score = sk.alignment_score || sd.alignment_score || 0;
            h += `<div class="cc-section">`;
            h += `<div class="cc-section-title"><span class="icon">&#127919;</span> Your Fit &mdash; ${pct(score)}% alignment</div>`;
            h += `<div class="alignment-bar"><div class="alignment-fill" style="width:${pct(score)}%;background:${alColor(score)}"></div></div>`;
            if (sd.tools_used?.length || sd.ml_frameworks?.length) {
                h += `<div style="margin-top:10px"><div class="rg-label">Their Stack</div><div class="tools-row">`;
                (sd.tools_used || []).concat(sd.ml_frameworks || []).forEach(t => { h += `<span class="tool-chip">${esc(t)}</span>`; });
                h += `</div></div>`;
            }
            if (sd.cloud_platform) h += `<div style="margin-top:6px"><div class="rg-label">Cloud</div><span class="tool-chip">${esc(sd.cloud_platform)}</span></div>`;
            if (sd.skills_to_learn?.length) {
                h += `<div style="margin-top:10px"><div class="rg-label">Skills to Build</div><div class="tools-row">`;
                sd.skills_to_learn.forEach(t => { h += `<span class="tool-chip learn">${esc(t)}</span>`; });
                h += `</div></div>`;
            }
            if (sd.gap_analysis) h += `<div style="margin-top:8px;font-size:0.84rem;color:var(--text-muted)">${esc(sd.gap_analysis)}</div>`;
            h += `</div>`;
        }

        // ---- TOOL SUGGESTIONS ----
        const tools = toolsFor(name);
        if (tools.length) {
            h += `<div class="cc-section">`;
            h += `<div class="cc-section-title"><span class="icon">&#128736;</span> Build to Impress</div>`;
            tools.forEach(t => {
                const td = jp(t.data_json);
                h += `<div class="tool-card">`;
                h += `<div class="tool-card-name">${esc(td.tool_name || t.tool_name)}</div>`;
                if (td.description) h += `<div class="tool-card-desc">${esc(td.description)}</div>`;
                if (td.why_impressive) h += `<div class="tool-card-why">${esc(td.why_impressive)}</div>`;
                if (td.estimated_revenue_impact) h += `<span class="tool-card-revenue">${esc(td.estimated_revenue_impact)}</span>`;
                if (S.uploadedResume) {
                    h += `<div class="tool-card-actions"><button class="btn btn-accent" onclick="onTailorResume(event,'${esc(name)}','${esc(td.tool_name || '')}','${esc((td.description || '').replace(/'/g, "\\'"))}')">Tailor Resume</button></div>`;
                }
                h += `</div>`;
            });
            h += `</div>`;
        }

        // ---- CONTACTS / MANAGEMENT ----
        if (cts.length) {
            h += `<div class="cc-section">`;
            h += `<div class="cc-section-title"><span class="icon">&#128101;</span> Management & Contacts</div>`;
            cts.forEach(ct => {
                h += `<div class="contact-row">`;
                h += `<div class="contact-avatar">${initials(ct.name)}</div>`;
                h += `<div class="contact-info"><div class="contact-name">${esc(ct.name)}</div><div class="contact-title">${esc(ct.title)}</div></div>`;
                h += `<div class="contact-links">`;
                if (ct.email) h += `<a href="mailto:${esc(ct.email)}">${esc(ct.email)}</a>`;
                if (ct.linkedin_url) h += `<a href="${esc(ct.linkedin_url)}" target="_blank">LinkedIn</a>`;
                h += `</div></div>`;
            });
            h += `</div>`;
        }

        // ---- TAILORED RESUME ----
        if (resume) {
            h += `<div class="cc-section">`;
            h += `<div class="cc-section-title"><span class="icon">&#128196;</span> Tailored Resume</div>`;
            if (rd.tailored_summary) h += `<div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:6px">${esc(rd.tailored_summary)}</div>`;
            if (rd.emphasis_areas?.length) {
                h += `<div class="tools-row" style="margin-bottom:6px">`;
                rd.emphasis_areas.forEach(a => { h += `<span class="tool-chip">${esc(a)}</span>`; });
                h += `</div>`;
            }
            if (rd.tailored_bullets?.length) {
                h += `<ul style="padding-left:16px;font-size:0.84rem;color:var(--text-muted)">`;
                rd.tailored_bullets.forEach(b => { h += `<li style="margin-bottom:3px">${esc(b)}</li>`; });
                h += `</ul>`;
            }
            h += `</div>`;
        }

        // ---- OUTREACH DRAFTS ----
        if (drs.length) {
            h += `<div class="cc-section">`;
            h += `<div class="cc-section-title"><span class="icon">&#9993;</span> Outreach</div>`;
            drs.forEach(dr => {
                const isDraft = dr.status === 'draft';
                h += `<div class="outreach-card">`;
                h += `<div style="display:flex;justify-content:space-between;align-items:center">`;
                h += `<div class="outreach-subject">${esc(dr.subject || 'No subject')}</div>`;
                h += `<span class="badge badge-${isDraft ? 'running' : 'completed'}">${dr.status}</span>`;
                h += `</div>`;
                if (dr.contact_name) h += `<div style="font-size:0.78rem;color:var(--text-dim)">To: ${esc(dr.contact_name)}</div>`;
                h += `<div class="outreach-body">${esc(dr.body)}</div>`;
                if (isDraft) h += `<div class="outreach-actions"><button class="btn btn-green" onclick="onApprove(event,${dr.id})">Approve Draft</button></div>`;
                h += `</div>`;
            });
            h += `</div>`;
        }

        h += `</div>`; // cc-body
    }

    h += `</div>`; // company-card
    return h;
}

// =========================================================================
// EVENTS
// =========================================================================
async function onConnect() {
    let url = document.getElementById('backendUrl').value.trim() || 'http://localhost:8000';
    url = url.replace(/\/+$/, '');
    document.getElementById('backendUrl').value = url;
    S.url = url; localStorage.setItem('jha_url', url);
    setDot('connecting');
    try {
        const d = await json('/health');
        if (d.status === 'ok') {
            S.connected = true; setDot('connected');
            setModeBadge(d.dspy_enabled, d.llm_provider);
            document.getElementById('overlay').classList.add('hidden');
            toast('Connected', 'success'); await loadSessions(); await loadUploadedResume();
        } else throw 0;
    } catch { S.connected = false; setDot('disconnected'); document.getElementById('overlay').classList.remove('hidden'); toast('Cannot reach backend', 'error'); }
}

async function onSearch() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q || !S.connected) return;
    document.getElementById('searchBtn').disabled = true;
    try {
        const r = await json('/search', { method: 'POST', body: JSON.stringify({ query: q }) });
        S.runId = r.run_id; S.steps = {}; S.expanded = {};
        S.data = { companies: [], profiles: [], skills: [], contacts: [], resumes: [], drafts: [], tool_suggestions: [] };
        toast('Search started', 'info');
        wsConnect(r.run_id); render(); await loadSessions();
    } catch (e) { toast('Search failed: ' + e.message, 'error'); }
    finally { document.getElementById('searchBtn').disabled = false; }
}

async function onSession(rid) {
    S.runId = rid; S.steps = {}; S.expanded = {};
    renderSidebar();
    await loadData(rid);
    const sess = S.sessions.find(s => s.run_id === rid);
    if (sess?.status === 'running') wsConnect(rid);
}

function toggleCompany(name) {
    S.expanded[name] = !S.expanded[name];
    renderContent();
}

async function onApprove(evt, draftId) {
    evt.stopPropagation();
    try {
        await json(`/sessions/${S.runId}/approve-draft/${draftId}`, { method: 'POST' });
        toast('Draft approved', 'success'); await loadData(S.runId);
    } catch (e) { toast('Failed: ' + e.message, 'error'); }
}

async function onDeleteSession(evt, rid) {
    evt.stopPropagation();
    if (!confirm('Delete this search session?')) return;
    try {
        await api(`/sessions/${rid}`, { method: 'DELETE' });
        S.sessions = S.sessions.filter(s => s.run_id !== rid);
        if (S.runId === rid) { S.runId = null; S.data = { companies:[], profiles:[], skills:[], contacts:[], resumes:[], drafts:[], tool_suggestions:[] }; }
        toast('Session deleted', 'success'); render();
    } catch (e) { toast('Delete failed: ' + e.message, 'error'); }
}

async function onDownloadExcel() {
    try {
        const r = await fetch(S.url + `/sessions/${S.runId}/excel`);
        if (!r.ok) { toast('Excel not available yet', 'error'); return; }
        const b = await r.blob(), a = document.createElement('a');
        a.href = URL.createObjectURL(b); a.download = `report_${S.runId.slice(0,8)}.xlsx`;
        a.click(); URL.revokeObjectURL(a.href); toast('Downloaded', 'success');
    } catch (e) { toast('Download failed', 'error'); }
}

// =========================================================================
// RESUME UPLOAD & TOOL TAILORING
// =========================================================================
function renderResumeUpload() {
    let h = '<div class="resume-upload-bar">';
    h += '<input type="file" id="resumeFileInput" accept=".pdf,.docx" style="display:none" onchange="onResumeUpload(event)" />';
    h += `<button class="btn btn-outline" onclick="document.getElementById('resumeFileInput').click()">Upload Resume</button>`;
    if (S.uploadedResume) {
        h += `<span class="filename">${esc(S.uploadedResume.filename)}</span>`;
        h += `<span class="preview">${esc((S.uploadedResume.content_text || '').slice(0, 120))}...</span>`;
    } else {
        h += `<span style="font-size:0.82rem;color:var(--text-dim)">Upload PDF/DOCX to enable resume tailoring per tool</span>`;
    }
    h += '</div>';
    return h;
}

async function onResumeUpload(evt) {
    const file = evt.target.files[0];
    if (!file) return;
    const formData = new FormData();
    formData.append('file', file);
    try {
        const r = await fetch(S.url + '/upload-resume', { method: 'POST', body: formData });
        if (!r.ok) { const e = await r.json(); toast(e.error || 'Upload failed', 'error'); return; }
        const data = await r.json();
        S.uploadedResume = { filename: data.filename, content_text: data.content_text, id: data.id };
        toast('Resume uploaded', 'success');
        render();
    } catch (e) { toast('Upload failed: ' + e.message, 'error'); }
}

async function onTailorResume(evt, company, toolName, toolDesc) {
    evt.stopPropagation();
    const btn = evt.target;
    btn.disabled = true; btn.textContent = 'Tailoring...';
    try {
        await json(`/sessions/${S.runId}/update-resume-for-tool`, {
            method: 'POST',
            body: JSON.stringify({ company_name: company, tool_name: toolName, tool_description: toolDesc }),
        });
        toast(`Resume tailored for ${toolName}`, 'success');
        await loadData(S.runId);
    } catch (e) { toast('Tailoring failed: ' + e.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Tailor Resume'; }
}

// =========================================================================
// LOADERS
// =========================================================================
async function loadSessions() { try { S.sessions = (await json('/sessions')).sessions || []; renderSidebar(); } catch {} }
async function loadData(rid) { try { S.data = await fetchAll(rid); render(); } catch { toast('Failed to load data', 'error'); } }
async function loadUploadedResume() {
    try {
        const r = await json('/uploaded-resume');
        if (r.resume) S.uploadedResume = { filename: r.resume.filename, content_text: r.resume.content_text, id: r.resume.id };
    } catch {}
}

// =========================================================================
// INIT
// =========================================================================
document.addEventListener('DOMContentLoaded', async () => {
    const saved = localStorage.getItem('jha_url');
    const isBackend = location.protocol.startsWith('http') && !location.protocol.startsWith('file');
    const url = saved || (isBackend ? location.origin : 'http://localhost:8000');
    document.getElementById('backendUrl').value = url;
    S.url = url; setDot('connecting');
    try {
        const d = await json('/health');
        if (d.status === 'ok') {
            S.connected = true; setDot('connected');
            setModeBadge(d.dspy_enabled, d.llm_provider);
            document.getElementById('overlay').classList.add('hidden');
            await loadSessions(); await loadUploadedResume();
        } else throw 0;
    } catch { setDot('disconnected'); document.getElementById('overlay').classList.remove('hidden'); }
});
</script>
</body>
</html>
