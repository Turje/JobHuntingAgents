app = "castnet-api"
primary_region = "ord"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  idle_timeout = "300s"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "castnet_data"
  destination = "/data"

[env]
  HOST = "0.0.0.0"
  PORT = "8000"
  DATABASE_PATH = "/data/pylon.db"
  EXCEL_OUTPUT_DIR = "/data/exports/"
  CORS_ORIGINS = "https://turje.github.io"

[checks]
  [checks.health]
    type = "http"
    port = 8000
    path = "/health"
    interval = "10s"
    timeout = "5s"
    grace_period = "5s"
